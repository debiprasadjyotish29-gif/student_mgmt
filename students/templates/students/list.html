{% extends 'students/base.html' %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
    <h3>📋 Students List</h3>
    <a href="{% url 'add_student' %}" class="btn btn-primary">+ Add Student</a>
</div>

<div class="card-box">

    <table class="table table-hover table-bordered align-middle">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Dept</th>
                <th>GPA</th>
                <th width="180">Action</th>
            </tr>
        </thead>

        <tbody>
        {% for s in students %}
            <tr>
                <td>{{ s.name }}</td>
                <td>{{ s.roll_no }}</td>
                <td>{{ s.department }}</td>
                <td><span class="badge bg-success">{{ s.gpa }}</span></td>
                <td>
                    <a href="{% url 'edit_student' s.id %}" class="btn btn-warning btn-sm">Edit</a>
                    <a href="{% url 'delete_student' s.id %}" class="btn btn-danger btn-sm">Delete</a>
                </td>
            </tr>
        {% empty %}
            <tr>
                <td colspan="5" class="text-center text-muted">No students found</td>
            </tr>
        {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
